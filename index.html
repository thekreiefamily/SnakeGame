<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }

/* ── Mobile layout ───────────────────────────────────────────── */
@media (max-width: 600px) {
  html, body { height: auto; min-height: 100svh; }
  body { flex-direction: column; overflow-y: auto; overflow-x: hidden; }
  #game-container { padding: 10px 10px 0; gap: 8px; width: 100%; }
  #hud { flex-wrap: wrap; justify-content: center; height: auto; gap: 10px; }
  #hunger-track { width: 110px; }
  #canvas-wrap { transform-origin: top center; flex-shrink: 0; align-self: center; }
  #sidebar {
    width: 100%; min-width: unset;
    border-left: none; border-top: 1px solid #1a1a2e;
    padding: 16px 14px 32px;
  }
  .sel-btn  { padding: 10px 4px; font-size: 0.8rem; }
  .theme-swatch { padding: 11px 4px; }
  .t-minimal #sidebar { border-top-color: #ddd; }
}

body {
  background: #0a0a0f;
  color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
  user-select: none;
  --accent: #4ade80;
}

#game-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  min-width: 0;
}

#hud {
  display: flex;
  align-items: center;
  gap: 24px;
  height: 44px;
}
#score-display { font-size: 1.3rem; font-weight: 700; letter-spacing: 3px; }

#hunger-wrap { display: none; flex-direction: column; gap: 4px; }
.hud-label { font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.45; }
#hunger-track { width: 160px; height: 9px; background: rgba(255,255,255,0.08); border-radius: 5px; overflow: hidden; }
#hunger-fill { height: 100%; width: 100%; border-radius: 5px; background: var(--accent); transition: background 0.3s; }

#health-wrap { display: none; align-items: center; gap: 6px; }
.heart { font-size: 1.15rem; line-height: 1; }

#timer-wrap { display: none; flex-direction: column; align-items: center; gap: 2px; }
#timer-val { font-size: 1.25rem; font-weight: 700; letter-spacing: 2px; }

#canvas-wrap {
  position: relative;
  line-height: 0;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 0 50px rgba(74,222,128,0.08), 0 0 0 1px rgba(255,255,255,0.05);
}
#gameCanvas { display: block; }

#vision-overlay {
  position: absolute; inset: 0;
  pointer-events: none; opacity: 0;
  background: radial-gradient(ellipse at center, rgba(0,20,0,0.1) 15%, rgba(0,40,0,0.95) 100%);
}

#game-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px;
  background: rgba(0,0,0,0.78);
  backdrop-filter: blur(6px);
}
#overlay-title { font-size: 2.4rem; font-weight: 900; letter-spacing: 7px; color: var(--accent); }
#death-msg {
  font-size: 1.05rem; letter-spacing: 0.5px;
  color: rgba(255,255,255,0.9); font-style: italic;
  display: none; text-align: center; padding: 0 24px;
  margin-top: 14px;
}
#overlay-score { font-size: 1.1rem; font-weight: 600; opacity: 0.8; display: none; letter-spacing: 2px; }
#start-btn {
  margin-top: 4px; padding: 11px 40px;
  background: var(--accent); color: #000;
  border: none; border-radius: 7px;
  font-size: 0.9rem; font-weight: 800; letter-spacing: 2px;
  cursor: pointer; transition: all 0.12s;
}
#start-btn:hover { filter: brightness(1.15); transform: scale(1.04); }
#overlay-sub { font-size: 0.68rem; opacity: 0.35; letter-spacing: 1px; }

/* ── Sidebar ─────────────────────────────────── */
#sidebar {
  width: 268px; min-width: 268px;
  background: #0d0d15;
  border-left: 1px solid #1a1a2e;
  padding: 22px 18px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 20px;
}
#sidebar-title { font-size: 1.4rem; font-weight: 900; letter-spacing: 6px; color: var(--accent); }
.panel-section { display: flex; flex-direction: column; gap: 9px; }
.section-label { font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.4; }

.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.btn-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }

.sel-btn {
  padding: 8px 4px;
  border: 1px solid #222238; background: transparent; color: inherit;
  border-radius: 6px; cursor: pointer;
  font-size: 0.77rem; font-weight: 600; letter-spacing: 0.4px;
  transition: all 0.12s;
}
.sel-btn:hover { border-color: var(--accent); color: var(--accent); }
.sel-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

.mode-hint { font-size: 0.7rem; opacity: 0.42; line-height: 1.55; min-height: 34px; }

.theme-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
.theme-swatch {
  padding: 9px 4px;
  border: 2px solid transparent; border-radius: 7px;
  cursor: pointer; font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.5px; text-align: center; transition: border-color 0.15s;
}
.theme-swatch.active { border-color: var(--accent) !important; }

.color-row { display: flex; align-items: center; gap: 10px; }
.color-row label { flex: 1; font-size: 0.77rem; opacity: 0.72; }
.color-row input[type=color] {
  width: 34px; height: 26px; padding: 1px 2px;
  border: 1px solid #333; border-radius: 4px;
  background: none; cursor: pointer;
}

.toggle-row { display: flex; align-items: center; gap: 10px; }
.toggle-row label { flex: 1; font-size: 0.77rem; opacity: 0.72; cursor: pointer; }
.toggle-row input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }

/* ── Themes ──────────────────────────────────── */
.t-retro          { background: #030c03 !important; --accent: #00ff41; }
.t-retro #sidebar { background: #030c03; border-left-color: #082008; }

.t-minimal          { background: #efefef !important; color: #111 !important; --accent: #111; }
.t-minimal #sidebar { background: #fafafa; border-left-color: #ddd; color: #111; }
.t-minimal .sel-btn { border-color: #ccc; color: #333; }
.t-minimal .sel-btn:hover { border-color: #111; color: #111; }
.t-minimal .sel-btn.active { background: #111; color: #fff; border-color: #111; }
.t-minimal #start-btn { background: #111; color: #fff; }
.t-minimal #start-btn:hover { background: #333; filter: none; }
.t-minimal #overlay-title { color: #111; }
.t-minimal #game-overlay { background: rgba(239,239,239,0.88); }
.t-minimal #death-msg, .t-minimal #overlay-score, .t-minimal #overlay-sub { color: #333; }

.t-cyberpunk          { background: #08001a !important; --accent: #00ffff; }
.t-cyberpunk #sidebar { background: #08001a; border-left-color: #200040; color: #c0c0ff; }
.t-cyberpunk #sidebar-title { color: #00ffff; }

.t-ocean          { background: #011826 !important; --accent: #22d3ee; }
.t-ocean #sidebar { background: #011826; border-left-color: #072a40; }

.t-lava          { background: #180400 !important; --accent: #f97316; }
.t-lava #sidebar { background: #180400; border-left-color: #3a0c00; }

.t-cave          { background: #0d0803 !important; --accent: #d97706; }
.t-cave #sidebar { background: #0d0803; border-left-color: #2a1205; }

.t-space          { background: #02000f !important; --accent: #a855f7; }
.t-space #sidebar { background: #02000f; border-left-color: #0d0030; color: #c4b5fd; }
.t-space #sidebar-title { color: #a855f7; }

.fruit-count-row { display:flex; align-items:center; gap:10px; }
.fruit-count-row input[type=range] { flex:1; accent-color:var(--accent); cursor:pointer; }
.fruit-count-val { font-size:0.85rem; font-weight:700; min-width:14px; text-align:right; }

@keyframes shake {
  0%,100% { transform: translate(0,0) rotate(0deg); }
  15%  { transform: translate(-5px, 2px) rotate(-0.5deg); }
  30%  { transform: translate(5px, -3px) rotate(0.5deg); }
  45%  { transform: translate(-4px, 4px) rotate(-0.3deg); }
  60%  { transform: translate(4px, -2px) rotate(0.3deg); }
  75%  { transform: translate(-2px, 3px) rotate(-0.2deg); }
}
.shake { animation: shake 0.4s ease; }
</style>
</head>
<body>

<div id="game-container">
  <div id="hud">
    <div id="score-display">SCORE: 0</div>
    <div id="hunger-wrap">
      <span class="hud-label">Hunger</span>

      <div id="death-msg"></div>
      <div id="overlay-score"></div>
      <button id="start-btn">START</button>
      <div id="overlay-sub">Arrow keys or WASD · Space to pause</div>
    </div>
  </div>
</div>

<div id="sidebar">
  <div id="sidebar-title">SNAKE</div>

  <div class="panel-section">
    <div class="section-label">Game Mode</div>
    <div class="btn-grid">
      <button class="sel-btn active" data-mode="classic">Classic</button>
      <button class="sel-btn" data-mode="hunger">Hunger</button>
      <button class="sel-btn" data-mode="rotten">Rotten</button>
      <button class="sel-btn" data-mode="hallucination">Hallucination</button>
      <button class="sel-btn" data-mode="ghost">Ghost</button>
      <button class="sel-btn" data-mode="time">Time Attack</button>
      <button class="sel-btn" data-mode="hotdog">Hotdog</button>
      <button class="sel-btn" data-mode="doppelganger">Doppelgänger</button>
    </div>
    <div class="mode-hint" id="mode-hint">Classic snake. Eat food, avoid walls and yourself.</div>
  </div>

  <div class="panel-section">
    <div class="section-label">Map</div>
    <div class="btn-grid">
      <button class="sel-btn active" data-map="open">Open</button>
      <button class="sel-btn" data-map="walled">Walled</button>
      <button class="sel-btn" data-map="maze">Maze</button>
      <button class="sel-btn" data-map="portal">Portal</button>
    </div>
  </div>

  <div class="panel-section">
    <div class="section-label">Map Size</div>
    <div class="btn-grid-3">
      <button class="sel-btn" data-size="small">Small</button>
      <button class="sel-btn active" data-size="medium">Medium</button>
      <button class="sel-btn" data-size="large">Large</button>
    </div>
  </div>

  <div class="panel-section">
    <div class="section-label">Speed</div>
    <div class="btn-grid">
      <button class="sel-btn" data-spd="slow">Slow</button>
      <button class="sel-btn active" data-spd="normal">Normal</button>
      <button class="sel-btn" data-spd="fast">Fast</button>
      <button class="sel-btn" data-spd="vfast">Very Fast</button>
    </div>
  </div>

  <div class="panel-section">
    <div class="section-label">Fruit Count</div>
    <div class="fruit-count-row">
      <input type="range" id="fruit-count" min="1" max="10" value="1" step="1">
      <span class="fruit-count-val" id="fruit-count-val">1</span>
    </div>
  </div>

  <div class="panel-section">
    <div class="section-label">Theme</div>
    <div class="theme-grid">
      <div class="theme-swatch active" data-theme="neon"
           style="background:#0a0a0f;color:#4ade80;border-color:#4ade80;">Neon</div>
      <div class="theme-swatch" data-theme="retro"
           style="background:#030c03;color:#00ff41;">Retro</div>
      <div class="theme-swatch" data-theme="minimal"
           style="background:#efefef;color:#111;border-color:#ccc;">Minimal</div>
      <div class="theme-swatch" data-theme="cyberpunk"
           style="background:#08001a;color:#00ffff;">Cyber</div>
      <div class="theme-swatch" data-theme="ocean"
           style="background:#011826;color:#22d3ee;">Ocean</div>
      <div class="theme-swatch" data-theme="lava"
           style="background:#180400;color:#f97316;">Lava</div>
      <div class="theme-swatch" data-theme="cave"
           style="background:#0d0803;color:#d97706;">Cave</div>
      <div class="theme-swatch" data-theme="space"
           style="background:#02000f;color:#a855f7;">Space</div>
    </div>
  </div>

  <div class="panel-section">
    <div class="section-label">Colors</div>
    <div class="color-row">
      <label for="c-snake">Snake body</label>
      <input type="color" id="c-snake" value="#4ade80">
    </div>
    <div class="color-row">
      <label for="c-head">Snake head</label>
      <input type="color" id="c-head" value="#86efac">
    </div>
    <div class="color-row">
      <label for="c-food">Food</label>
      <input type="color" id="c-food" value="#f87171">
    </div>
    <div class="color-row">
      <label for="c-bg">Background</label>
      <input type="color" id="c-bg" value="#111118">
    </div>
  </div>

  <div class="panel-section">
    <div class="section-label">Options</div>
    <div class="toggle-row">
      <label for="opt-grid">Show grid</label>
      <input type="checkbox" id="opt-grid">
    </div>
    <div class="toggle-row">
      <label for="opt-smooth">Smooth movement</label>
      <input type="checkbox" id="opt-smooth" checked>
    </div>
    <div class="toggle-row">
      <label for="opt-music">Music</label>
      <input type="checkbox" id="opt-music" checked>
    </div>
  </div>
</div>

function roundRect(c,x,y,w,h,r) {
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

// ── Map builders ─────────────────────────────────────────────
function buildMaze() {
  // Four solid corner blocks with a guaranteed clear center for spawn.
  // Blocks occupy ~14–36% and 64–86% of each axis.
  const cells = new Set();
  const bx1s=Math.round(COLS*0.14), bx1e=Math.round(COLS*0.36);
  const bx2s=Math.round(COLS*0.64), bx2e=Math.round(COLS*0.86);
  const by1s=Math.round(ROWS*0.14), by1e=Math.round(ROWS*0.36);
  const by2s=Math.round(ROWS*0.64), by2e=Math.round(ROWS*0.86);
  const safe=(x,y)=>x>0&&x<COLS-1&&y>0&&y<ROWS-1;
  for(let x=bx1s;x<=bx1e;x++) for(let y=by1s;y<=by1e;y++) if(safe(x,y)) cells.add(`${x},${y}`);
  for(let x=bx2s;x<=bx2e;x++) for(let y=by1s;y<=by1e;y++) if(safe(x,y)) cells.add(`${x},${y}`);
  for(let x=bx1s;x<=bx1e;x++) for(let y=by2s;y<=by2e;y++) if(safe(x,y)) cells.add(`${x},${y}`);
  for(let x=bx2s;x<=bx2e;x++) for(let y=by2s;y<=by2e;y++) if(safe(x,y)) cells.add(`${x},${y}`);
  return [...cells].map(k=>{ const [x,y]=k.split(','); return {x:+x,y:+y}; });
}

function buildPortals() {
  const mx=Math.floor(COLS/2), my=Math.floor(ROWS/2);
  return [
    { a:{x:1,y:1},       b:{x:COLS-2,y:ROWS-2}, color:'#a78bfa' },
    { a:{x:COLS-2,y:1},  b:{x:1,y:ROWS-2},       color:'#fb923c' },
    { a:{x:mx,y:0},      b:{x:mx,y:ROWS-1},       color:'#38bdf8' },
    { a:{x:0,y:my},      b:{x:COLS-1,y:my},       color:'#f472b6' },
  ];
}

function drawSegmentPixels(px,py,alpha) {
  if(CELL<14) return;
  const dot=Math.max(1,Math.floor(CELL*0.09));
  const pad=Math.ceil(CELL*0.22);
  const step=Math.ceil((CELL-pad*2-dot)/2);
  if(step<2) return;
  ctx.fillStyle=`rgba(255,255,255,${(alpha*0.13).toFixed(3)})`;
  for(let tx=pad;tx<CELL-pad;tx+=step)
    for(let ty=pad;ty<CELL-pad;ty+=step)
      ctx.fillRect(Math.floor(px+tx),Math.floor(py+ty),dot,dot);
}

// ── Occupied set ─────────────────────────────────────────────
function occupiedSet(extras=[]) {
  const s = new Set();
  for(const p of G.snake)       s.add(`${p.x},${p.y}`);
  for(const o of G.obstacles)   s.add(`${o.x},${o.y}`);
  if(G.food)                     s.add(`${G.food.x},${G.food.y}`);
  for(const f of G.rottenFoods) s.add(`${f.x},${f.y}`);
  if(G.fakeFood)                  s.add(`${G.fakeFood.x},${G.fakeFood.y}`);
  for(const f of G.extraFoods)   s.add(`${f.x},${f.y}`);
  if(G.mode==='doppelganger')   for(const p of G.dopple) s.add(`${p.x},${p.y}`);
  for(const e of extras)         s.add(`${e.x},${e.y}`);
  return s;
}
function freeCell(extras=[]) {
  const blocked = occupiedSet(extras);
  let pos, tries=0;
  do { pos={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; tries++; }
  while(blocked.has(`${pos.x},${pos.y}`)&&tries<2000);
  return pos;
}
function spawnRotten(n) {
  const r=[];
  for(let i=0;i<n;i++) r.push(freeCell(r));
  return r;
}

// ── Portal / obstacle ────────────────────────────────────────
function checkPortal(x,y) {
  for(const p of currentPortals) {
    if(p.a.x===x&&p.a.y===y) return p.b;
    if(p.b.x===x&&p.b.y===y) return p.a;
  }
  return null;
}
function isObstacle(x,y) { return G.obstacles.some(o=>o.x===x&&o.y===y); }

// ── Hotdog walls ─────────────────────────────────────────────
function computeHotdogWalls() {
  const walls = new Set();
  const snakeSet = new Set(G.snake.map(s=>`${s.x},${s.y}`));
  for(let i=1;i<G.snake.length;i++) {
    const {x,y}=G.snake[i];
    for(const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      let nx=x+dx, ny=y+dy;
      if(G.map==='walled') { if(nx<0||nx>=COLS||ny<0||ny>=ROWS) continue; }
      else { nx=(nx+COLS)%COLS; ny=(ny+ROWS)%ROWS; }
      if(!snakeSet.has(`${nx},${ny}`)) walls.add(`${nx},${ny}`);
    }
  }
  return walls;
}

// ── Doppelganger AI ──────────────────────────────────────────
function countReachable(sx,sy,blocked) {
  const visited=new Set([`${sx},${sy}`]);
  const q=[{x:sx,y:sy}]; let head=0;
  while(head<q.length&&visited.size<150) {
    const {x,y}=q[head++];
    for(const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nx=(x+dx+COLS)%COLS, ny=(y+dy+ROWS)%ROWS;
      const k=`${nx},${ny}`;
      if(!visited.has(k)&&!blocked.has(k)) { visited.add(k); q.push({x:nx,y:ny}); }
    }
  }
  return visited.size;
}

function doppleNextDir() {
  const head=G.dopple[0];
  const d=G.doppleDir;
  const candidates=[d,{x:-d.y,y:d.x},{x:d.y,y:-d.x},{x:-d.x,y:-d.y}];
  const blocked=new Set([
    ...G.dopple.map(s=>`${s.x},${s.y}`),
    ...G.snake.map(s=>`${s.x},${s.y}`),
    ...G.obstacles.map(o=>`${o.x},${o.y}`),
  ]);
  let best=null, bestScore=-1;
  for(const dir of candidates) {
    let nx=head.x+dir.x, ny=head.y+dir.y;
    if(G.map==='walled'&&(nx<0||nx>=COLS||ny<0||ny>=ROWS)) continue;
    nx=(nx+COLS)%COLS; ny=(ny+ROWS)%ROWS;
    if(blocked.has(`${nx},${ny}`)) continue;
    const score=countReachable(nx,ny,blocked);
    if(score>bestScore) { bestScore=score; best=dir; }
  }
  return best;
}

function doppleTick() {
  const nextDir=doppleNextDir();
  if(!nextDir) { gameOver(pick(DEATHS.doppleWin), true); return; }
  G.doppleDir=nextDir;
  const {x,y}=G.dopple[0];
  let nx=(x+G.doppleDir.x+COLS)%COLS, ny=(y+G.doppleDir.y+ROWS)%ROWS;
  if(G.map==='walled'&&(x+G.doppleDir.x<0||x+G.doppleDir.x>=COLS||y+G.doppleDir.y<0||y+G.doppleDir.y>=ROWS)) {
    gameOver(pick(DEATHS.doppleWin), true); return;
  }
  G.dopple.unshift({x:nx,y:ny});
  if(G.doppleGrow>0) { G.doppleGrow--; } else { G.dopple.pop(); }
}

// ── Audio / Music ─────────────────────────────────────────────
function initAudio() {
  if(audioCtx) { audioCtx.resume(); return; }
  try {
    audioCtx   = new(window.AudioContext||window.webkitAudioContext)();
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -10; comp.knee.value = 6;
    comp.ratio.value = 4; comp.attack.value = 0.003; comp.release.value = 0.2;
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.75;
    masterGain.connect(comp);
    comp.connect(audioCtx.destination);
  } catch(e) { musicOn = false; }
}

function buildEcho(theme) {
  if(echoChain) {
    try{ echoChain.delay.disconnect(); echoChain.fb.disconnect(); echoChain.wet.disconnect(); }catch(e){}
    echoChain = null;
  }
  if((theme==='space'||theme==='cave') && audioCtx) {
    const delay = audioCtx.createDelay(1.0);
    const fb    = audioCtx.createGain();
    const wet   = audioCtx.createGain();
    delay.delayTime.value = theme==='space' ? 0.38 : 0.20;
    fb.gain.value         = theme==='space' ? 0.44 : 0.28;
    wet.gain.value        = 0.28;
    delay.connect(fb); fb.connect(delay);
    delay.connect(wet); wet.connect(masterGain);
    echoChain = {delay, fb, wet};
  }
}

function scheduleNote(freq, t, dur, type, vol) {
  if(!freq || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const env = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  const atk = 0.015, rel = Math.min(0.07, dur * 0.2);
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(vol, t + atk);
  env.gain.setValueAtTime(vol, t + dur - rel);
  env.gain.linearRampToValueAtTime(0, t + dur);
  osc.connect(env);
  env.connect(masterGain);
  if(echoChain) env.connect(echoChain.delay);
  osc.start(t); osc.stop(t + dur + 0.02);
}

function schedulePattern(def, startT) {
  const beat = 60 / def.bpm;
  let t = startT;
  for(const [f, b] of def.lead) {
    if(f) scheduleNote(f, t, b * beat * 0.85, def.lT, def.lV);
    t += b * beat;
  }
  const leadBeats = def.lead.reduce((s,[,b]) => s + b, 0);
  const bassBeats = def.bass.reduce((s,[,b]) => s + b, 0);
  let tb = startT;
  const loops = Math.ceil(leadBeats / bassBeats);
  let done = false;
  for(let i = 0; i < loops && !done; i++) {
    for(const [f, b] of def.bass) {
      if(f) scheduleNote(f, tb, b * beat * 0.9, def.bT, def.bV);
      tb += b * beat;
      if(tb - startT >= leadBeats * beat) { done = true; break; }
    }
  }
  if(def.perc) {
    const {bar=4, k=[], s=[], h=[], kv=.5, sv=.2, hv=.07} = def.perc;
    const bars = Math.ceil(leadBeats / bar);
    const loopEnd = startT + leadBeats * beat;
    for(let i = 0; i < bars; i++) {
      const bt = startT + i * bar * beat;
      for(const off of k) { const pt=bt+off*beat; if(pt<loopEnd) kick(pt,kv); }
      for(const off of s) { const pt=bt+off*beat; if(pt<loopEnd) snare(pt,sv); }
      for(const off of h) { const pt=bt+off*beat; if(pt<loopEnd) hihat(pt,hv); }
    }
  }
  return startT + leadBeats * beat;
}

function startMusic() {
  stopMusic();
  if(!musicOn || !audioCtx) return;
  audioCtx.resume();
  const def = MUSIC_DEFS[currentTheme] || MUSIC_DEFS.neon;
  buildEcho(currentTheme);
  const pump = (startT) => {
    if(!musicOn || !G.running) return;
    const nextT  = schedulePattern(def, startT);
    const waitMs = Math.max(50, (nextT - audioCtx.currentTime - 0.15) * 1000);
    musicTimer   = setTimeout(() => pump(nextT), waitMs);
  };
  pump(audioCtx.currentTime + 0.05);
}

function stopMusic() {
  if(musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
}

// ── Percussion ────────────────────────────────────────────────
function _noise() {
  if(_noiseBuf && audioCtx && _noiseBuf.sampleRate===audioCtx.sampleRate) return _noiseBuf;
  if(!audioCtx) return null;
  const len = Math.ceil(audioCtx.sampleRate * 0.25);
  _noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = _noiseBuf.getChannelData(0);
  for(let i=0; i<len; i++) d[i] = Math.random()*2-1;
  return _noiseBuf;
}
function kick(t, vol=0.5) {
  if(!audioCtx) return;
  const osc=audioCtx.createOscillator(), env=audioCtx.createGain();
  osc.type='sine';
  osc.frequency.setValueAtTime(100, t);
  osc.frequency.exponentialRampToValueAtTime(35, t+0.075);
  env.gain.setValueAtTime(vol, t);
  env.gain.exponentialRampToValueAtTime(0.001, t+0.22);
  osc.connect(env); env.connect(masterGain);
  if(echoChain) env.connect(echoChain.delay);
  osc.start(t); osc.stop(t+0.25);
}
function snare(t, vol=0.2) {
  if(!audioCtx) return;
  const buf=_noise(); if(!buf) return;
  const src=audioCtx.createBufferSource(); src.buffer=buf;
  const bp=audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2200; bp.Q.value=0.8;
  const env=audioCtx.createGain();
  env.gain.setValueAtTime(vol, t); env.gain.exponentialRampToValueAtTime(0.001, t+0.13);
  const osc=audioCtx.createOscillator(), oenv=audioCtx.createGain();
  osc.type='triangle'; osc.frequency.value=180;
  oenv.gain.setValueAtTime(vol*0.5, t); oenv.gain.exponentialRampToValueAtTime(0.001, t+0.045);
  src.connect(bp); bp.connect(env); env.connect(masterGain);
  osc.connect(oenv); oenv.connect(masterGain);
  src.start(t); src.stop(t+0.18);
  osc.start(t); osc.stop(t+0.06);
}
function hihat(t, vol=0.07) {
  if(!audioCtx) return;
  const buf=_noise(); if(!buf) return;
  const src=audioCtx.createBufferSource(); src.buffer=buf;
  const hp=audioCtx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=9000;
  const env=audioCtx.createGain();
  env.gain.setValueAtTime(vol, t); env.gain.exponentialRampToValueAtTime(0.001, t+0.032);
  src.connect(hp); hp.connect(env); env.connect(masterGain);
  src.start(t); src.stop(t+0.05);
}

// ── Start / Game Over ────────────────────────────────────────
function startGame() {
  const sz=SIZE_DEFS[G.size];
  COLS=sz.cols; ROWS=sz.rows; CELL=sz.cell;
  canvas.width=CANVAS_PX; canvas.height=CANVAS_PX;

  G.obstacles    = G.map==='maze' ? buildMaze() : [];
  currentPortals = G.map==='portal' ? buildPortals() : [];

  const cx=Math.floor(COLS/2), cy=Math.floor(ROWS/2);
  G.snake      = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  G.prevSnake  = G.snake.map(p=>({...p}));
  G.dir        = {x:1,y:0}; G.nextDir={x:1,y:0};
  G.score=0; G.health=MAX_HEALTH; G.hungerT=1;
  G.speed=SPEED_DEFS[selectedSpeed]; G.poisonLevel=0; G.poisonExpiry=0;
  G.running=true; G.paused=false; G._dead=false; G.interpT=0;
  G.hotdogWalls=new Set();

  const t0=performance.now();
  G.hungerStart=t0; G.timeStart=t0; G.lastTick=t0;

  G.food        = freeCell();
  G.fakeFood    = G.mode==='hallucination' ? freeCell([G.food]) : null;
  G.extraFoods  = [];
  for(let i=1; i<foodCount; i++) G.extraFoods.push(freeCell(G.extraFoods));
  G.rottenFoods = G.mode==='rotten' ? spawnRotten(ROTTEN_COUNT) : [];

  if(G.mode==='doppelganger') {
    const dx=COLS-4, dy=2;
    G.dopple    =[{x:dx,y:dy},{x:dx+1,y:dy},{x:dx+2,y:dy}];
    G.prevDopple=G.dopple.map(p=>({...p}));
    G.doppleDir ={x:-1,y:0};
    G.doppleGrow=0;
  } else { G.dopple=[]; G.prevDopple=[]; }

  clearVision();
  buildBgTexture();
  buildStars();
  updateHUD(t0);
  deathMsg.style.display='none';
  overlay.style.display='none'; ovScore.style.display='none';
  startBtn.textContent='START';
  if(G.animFrame) cancelAnimationFrame(G.animFrame);
  initAudio();
  if(musicOn) startMusic();
  G.animFrame=requestAnimationFrame(loop);
}

function gameOver(flavour, isWin=false) {
  if(G._dead) return;
  G._dead=true; G.running=false;
  stopMusic();
  cancelAnimationFrame(G.animFrame);
  ovTitle.textContent = isWin ? 'YOU WIN' : 'GAME OVER';
  deathMsg.textContent = flavour || pick(DEATHS.default);
  deathMsg.style.display='block';
  ovScore.textContent=`SCORE: ${G.score}`;
  ovScore.style.display='block';
  startBtn.textContent='PLAY AGAIN';
  overlay.style.display='flex';
  canvasWrap.classList.remove('shake');
  void canvasWrap.offsetWidth;
  canvasWrap.classList.add('shake');
}

// ── Game Loop ────────────────────────────────────────────────
function loop(now) {
  if(!G.running) return;
  G.animFrame=requestAnimationFrame(loop);
  if(G.paused) return;

  updateHUD(now);
  if(G.mode==='hunger'&&G.hungerT<=0) { gameOver(pick(DEATHS.hunger)); return; }
  if(G.mode==='time'&&G.timeLeft<=0)  { gameOver(pick(DEATHS.time)); return; }

  if(G.mode==='rotten'&&G.poisonLevel>0&&now>=G.poisonExpiry) {
    G.poisonLevel=Math.max(0,G.poisonLevel-1);
    if(G.poisonLevel>0) G.poisonExpiry=now+POISON_DURATION;
  }
  applyVision(now);

  const elapsed=now-G.lastTick;
  if(elapsed>=G.speed) {
    G.prevSnake=G.snake.map(p=>({...p}));
    if(G.mode==='doppelganger') G.prevDopple=G.dopple.map(p=>({...p}));
    G.interpT=0;
    tick(now);
    G.lastTick=now;
  } else {
    G.interpT=elapsed/G.speed;
  }
  render(G.smooth?G.interpT:1);
}

// ── Tick ─────────────────────────────────────────────────────
function tick(now) {
  G.dir={...G.nextDir};

  if(G.mode==='hotdog') G.hotdogWalls=computeHotdogWalls();

  let nx=G.snake[0].x+G.dir.x, ny=G.snake[0].y+G.dir.y;

  const walled=G.map==='walled';
  const portal=G.map==='portal';

  if(walled&&(nx<0||nx>=COLS||ny<0||ny>=ROWS)) { gameOver(pick(DEATHS.wall)); return; }
  else if(portal) {
    const tp=checkPortal(nx,ny);
    if(tp) { nx=tp.x; ny=tp.y; }
    else   { nx=(nx+COLS)%COLS; ny=(ny+ROWS)%ROWS; }
  } else { nx=(nx+COLS)%COLS; ny=(ny+ROWS)%ROWS; }

  if(isObstacle(nx,ny)) { gameOver(pick(DEATHS.obstacle)); return; }
  if(G.mode==='hotdog'&&G.hotdogWalls.has(`${nx},${ny}`)) { gameOver(pick(DEATHS.hotdog)); return; }
  if(G.snake.some(s=>s.x===nx&&s.y===ny)) { gameOver(pick(DEATHS.self)); return; }
  if(G.mode==='doppelganger'&&G.dopple.some(s=>s.x===nx&&s.y===ny)) { gameOver(pick(DEATHS.doppelganger)); return; }

  G.snake.unshift({x:nx,y:ny});

  let ate=false;
  if(G.food&&nx===G.food.x&&ny===G.food.y) {
    if(G.mode==='hallucination') {
      G.score++;
      G.food=freeCell([G.fakeFood]);
      G.fakeFood=freeCell([G.food]);
    } else {
      G.score++;
      G.food=freeCell();
    }
    ate=true;
    if(G.score>=WIN_SCORES[G.size]) { gameOver(pick(DEATHS.win), true); return; }
    if(G.mode==='hunger') G.hungerStart=now;
    if(G.mode==='doppelganger') G.doppleGrow++;
  } else if(G.mode==='hallucination'&&G.fakeFood&&nx===G.fakeFood.x&&ny===G.fakeFood.y) {
    G.food=freeCell();
    G.fakeFood=freeCell([G.food]);
  }

  if(!ate) {
    for(let i=0; i<G.extraFoods.length; i++) {
      if(G.extraFoods[i].x===nx && G.extraFoods[i].y===ny) {
        G.extraFoods[i]=freeCell();
        G.score++;
        if(G.score>=WIN_SCORES[G.size]) { gameOver(pick(DEATHS.win), true); return; }
        ate=true;
        if(G.mode==='hunger') G.hungerStart=now;
        if(G.mode==='doppelganger') G.doppleGrow++;
        break;
      }
    }
  }

  if(G.mode==='rotten') {
    const ri=G.rottenFoods.findIndex(f=>f.x===nx&&f.y===ny);
    if(ri!==-1) {
      G.rottenFoods.splice(ri,1);
      G.rottenFoods.push(freeCell());
      G.health--;
      G.poisonLevel=Math.min(MAX_HEALTH,G.poisonLevel+1);
      G.poisonExpiry=now+POISON_DURATION;
      if(G.health<=0) { gameOver(pick(DEATHS.poisoned)); return; }
    }
  }

  if(!ate) G.snake.pop();

  if(G.mode==='doppelganger') doppleTick();
}

// ── Render ───────────────────────────────────────────────────
function render(t) {
  ctx.clearRect(0,0,CANVAS_PX,CANVAS_PX);
  ctx.fillStyle=G.colors.bg;
  ctx.fillRect(0,0,CANVAS_PX,CANVAS_PX);
  drawBgEffects();

  if(G.showGrid) {
    ctx.strokeStyle='rgba(255,255,255,0.04)';
    ctx.lineWidth=0.5;
    for(let x=0;x<=COLS;x++) {
      ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,CANVAS_PX); ctx.stroke();
    }
    for(let y=0;y<=ROWS;y++) {
      ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(CANVAS_PX,y*CELL); ctx.stroke();
    }
  }

  ctx.fillStyle='rgba(255,255,255,0.12)';
  for(const o of G.obstacles) {
    roundRect(ctx,o.x*CELL+1,o.y*CELL+1,CELL-2,CELL-2,3); ctx.fill();
  }

  if(G.mode==='hotdog'&&G.hotdogWalls.size>0) {
    for(const key of G.hotdogWalls) {
      const [x,y]=key.split(',');
      ctx.fillStyle='rgba(239,68,68,0.18)';
      ctx.fillRect(+x*CELL,+y*CELL,CELL,CELL);
      ctx.strokeStyle='rgba(239,68,68,0.38)';
      ctx.lineWidth=0.5;
      ctx.strokeRect(+x*CELL+0.5,+y*CELL+0.5,CELL-1,CELL-1);
    }
    ctx.lineWidth=1;
  }

  if(G.map==='portal') {
    const now=performance.now();
    for(const p of currentPortals) {
      drawPortal(p.a.x,p.a.y,p.color,now);
      drawPortal(p.b.x,p.b.y,p.color,now);
    }
  }

  if(G.food) drawFood(G.food.x,G.food.y,G.colors.food);
  if(G.mode==='hallucination'&&G.fakeFood) drawFood(G.fakeFood.x,G.fakeFood.y,G.colors.food);
  for(const f of G.extraFoods) drawFood(f.x,f.y,G.colors.food);
  for(const f of G.rottenFoods) drawRottenFood(f.x,f.y);

  if(G.mode==='doppelganger'&&G.dopple.length) drawDoppelSnake(t);
  drawSnake(t);
}

function interpPos(cur,prev,t) {
  if(!prev) return {x:cur.x,y:cur.y};
  const dx=Math.abs(cur.x-prev.x), dy=Math.abs(cur.y-prev.y);
  if(dx>1||dy>1) return {x:cur.x,y:cur.y};
  return {x:lerp(prev.x,cur.x,t),y:lerp(prev.y,cur.y,t)};
}

function drawSnake(t) {
  const n=G.snake.length;
  const rgb=hexToRgb(G.colors.snake);
  for(let i=n-1;i>=0;i--) {
    const pos=G.smooth?interpPos(G.snake[i],G.prevSnake[i],t):G.snake[i];
    const px=pos.x*CELL, py=pos.y*CELL;
    const isHead=i===0;
    const alpha=1-(i/n)*0.45;
    ctx.fillStyle=isHead?G.colors.head:`rgba(${rgb.r},${rgb.g},${rgb.b},${alpha.toFixed(2)})`;
    roundRect(ctx,px+1,py+1,CELL-2,CELL-2,isHead?5:3); ctx.fill();
    if(!isHead) drawSegmentPixels(px,py,alpha);
    if(isHead) drawEyes(px,py,G.dir,G.colors.bg);
  }
}

function drawDoppelSnake(t) {
  const n=G.dopple.length;
  for(let i=n-1;i>=0;i--) {
    const pos=G.smooth?interpPos(G.dopple[i],G.prevDopple[i],t):G.dopple[i];
    const px=pos.x*CELL, py=pos.y*CELL;
    const isHead=i===0;
    const alpha=1-(i/n)*0.45;
    ctx.fillStyle=isHead?'#fb923c':`rgba(234,88,12,${alpha.toFixed(2)})`;
    roundRect(ctx,px+1,py+1,CELL-2,CELL-2,isHead?5:3); ctx.fill();
    if(!isHead) drawSegmentPixels(px,py,alpha);
    if(isHead) drawEyes(px,py,G.doppleDir,'#1a0800');
  }
}

function drawEyes(px,py,dir,col) {
  ctx.fillStyle=col;
  let e1x,e1y,e2x,e2y;
  if     (dir.x=== 1){e1x=px+CELL*0.68;e1y=py+CELL*0.22;e2x=px+CELL*0.68;e2y=py+CELL*0.62;}
  else if(dir.x===-1){e1x=px+CELL*0.32;e1y=py+CELL*0.22;e2x=px+CELL*0.32;e2y=py+CELL*0.62;}
  else if(dir.y=== 1){e1x=px+CELL*0.22;e1y=py+CELL*0.68;e2x=px+CELL*0.62;e2y=py+CELL*0.68;}
  else               {e1x=px+CELL*0.22;e1y=py+CELL*0.32;e2x=px+CELL*0.62;e2y=py+CELL*0.32;}
  const r=Math.max(1.2,CELL*0.13);
  ctx.beginPath(); ctx.arc(e1x,e1y,r,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(e2x,e2y,r,0,Math.PI*2); ctx.fill();
}

function drawFood(gx,gy,color) {
  const baseCx=gx*CELL+CELL/2, baseCy=gy*CELL+CELL/2;
  const r=CELL/2-Math.max(1,CELL*0.15);
  const now=performance.now();

  // Ghost mode: food is barely visible, pulsing faint ring
  if(G.mode==='ghost') {
    const pulse=0.5+0.5*Math.sin(now/700);
    ctx.globalAlpha=0.06+0.07*pulse;
    ctx.shadowColor=color; ctx.shadowBlur=14;
    ctx.fillStyle=color;
    ctx.beginPath(); ctx.arc(baseCx,baseCy,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.globalAlpha=0.1+0.1*pulse;
    ctx.strokeStyle=color; ctx.lineWidth=1;
    ctx.setLineDash([2,4]);
    ctx.beginPath(); ctx.arc(baseCx,baseCy,r+2,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha=1;
    return;
  }

  // Normal draw
  let cx=baseCx, cy=baseCy;
  ctx.shadowColor=color; ctx.shadowBlur=10;
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.arc(cx-r*0.3,cy-r*0.3,r*0.32,0,Math.PI*2); ctx.fill();
}

function drawRottenFood(gx,gy) {
  const cx=gx*CELL+CELL/2, cy=gy*CELL+CELL/2, r=CELL/2-Math.max(1,CELL*0.15);
  ctx.shadowColor='#451a03'; ctx.shadowBlur=8;
  ctx.fillStyle='#78350f'; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#92400e'; ctx.beginPath(); ctx.arc(cx,cy,r*0.7,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='#fbbf24'; ctx.lineWidth=Math.max(1,CELL*0.09);
  const d=r*0.45;
  ctx.beginPath(); ctx.moveTo(cx-d,cy-d); ctx.lineTo(cx+d,cy+d);
  ctx.moveTo(cx+d,cy-d); ctx.lineTo(cx-d,cy+d); ctx.stroke();
  ctx.lineWidth=1;
}

function drawPortal(gx,gy,color,now) {
  const cx=gx*CELL+CELL/2, cy=gy*CELL+CELL/2;
  const pulse=0.6+0.4*Math.sin(now/420);
  ctx.shadowColor=color; ctx.shadowBlur=12*pulse;
  ctx.strokeStyle=color; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(cx,cy,CELL/2-2,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle=color+'28';
  ctx.beginPath(); ctx.arc(cx,cy,CELL/2-2,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.lineWidth=1;
}

// ── Input ────────────────────────────────────────────────────
const DIRS={
  ArrowUp:{x:0,y:-1},w:{x:0,y:-1},W:{x:0,y:-1},
  ArrowDown:{x:0,y:1},s:{x:0,y:1},S:{x:0,y:1},
  ArrowLeft:{x:-1,y:0},a:{x:-1,y:0},A:{x:-1,y:0},
  ArrowRight:{x:1,y:0},d:{x:1,y:0},D:{x:1,y:0},
};
document.addEventListener('keydown',e=>{
  const d=DIRS[e.key];
  if(d) {
    e.preventDefault();
    if(d.x!==-G.dir.x||d.y!==-G.dir.y) G.nextDir=d;
    return;
  }
  if(e.key===' ') {
    e.preventDefault();
    if(!G.running) return;
    G.paused=!G.paused;
    if(!G.paused) G.lastTick=performance.now();
  }
});

document.getElementById('c-bg').addEventListener('input',   e=>{G.colors.bg=e.target.value;   if(!G.running)render(1);});
document.getElementById('opt-grid').addEventListener('change',  e=>{G.showGrid=e.target.checked;if(!G.running)render(1);});
document.getElementById('opt-smooth').addEventListener('change',e=>{G.smooth=e.target.checked;});

const fruitSlider = document.getElementById('fruit-count');
const fruitLabel  = document.getElementById('fruit-count-val');
fruitSlider.addEventListener('input', e => {
  foodCount = +e.target.value;
  fruitLabel.textContent = foodCount;
});

document.getElementById('opt-music').addEventListener('change', e => {
  musicOn = e.target.checked;
  if(!musicOn) stopMusic();
  else if(G.running) { initAudio(); startMusic(); }
});

// ── Init ─────────────────────────────────────────────────────
G.colors={...THEME_COLORS.neon};
buildBgTexture();
buildStars();
render(1);

// ── Mobile / Touch ────────────────────────────────────────────
function fitCanvas() {
  const vw = window.innerWidth;
  if(vw < 540) {
    const scale = (vw - 16) / 500;
    canvasWrap.style.transform     = `scale(${scale.toFixed(4)})`;
    canvasWrap.style.marginBottom  = `${Math.round(500 * (scale - 1))}px`;
  } else {
    canvasWrap.style.transform    = '';
    canvasWrap.style.marginBottom = '';
  }
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

if('ontouchstart' in window) {
  document.getElementById('overlay-sub').textContent = 'Swipe to move · Tap canvas to pause';
}

let _tx0 = 0, _ty0 = 0;
canvas.addEventListener('touchstart', e => {
  _tx0 = e.touches[0].clientX;
  _ty0 = e.touches[0].clientY;
  e.preventDefault();
}, {passive: false});

canvas.addEventListener('touchmove', e => e.preventDefault(), {passive: false});

canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - _tx0;
  const dy = e.changedTouches[0].clientY - _ty0;
  if(Math.abs(dx) < 12 && Math.abs(dy) < 12) {
    if(G.running) { G.paused = !G.paused; if(!G.paused) G.lastTick = performance.now(); }
    return;
  }
  if(Math.abs(dx) < 15 && Math.abs(dy) < 15) return;
  const d = Math.abs(dx) > Math.abs(dy)
    ? (dx > 0 ? {x:1,y:0} : {x:-1,y:0})
    : (dy > 0 ? {x:0,y:1} : {x:0,y:-1});
  if(d.x !== -G.dir.x || d.y !== -G.dir.y) G.nextDir = d;
  e.preventDefault();
}, {passive: false});
</script>
